# Cấu hình Alembic — migrations cho agent-engine (Sprint 1.1).
#
# URL kết nối KHÔNG đặt ở đây; alembic/env.py đọc từ biến môi trường
# DATABASE_URL lúc chạy (an toàn, không commit credential).
#
# Chạy:
#   cd apps/agent-engine
#   DATABASE_URL=postgresql://... alembic upgrade head
#   DATABASE_URL=postgresql://... alembic revision --autogenerate -m "msg"

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url để trống — env.py tự nạp từ DATABASE_URL.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
